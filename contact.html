<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Dokyong Ryoo</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: black;
        color: white;
        font-family: Arial, sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .inline-link {
        color: white;
        text-decoration: none;
        border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        transition: 0.3s;
      }

      .inline-link:visited {
        color: #001aff;
      }

      .inline-link:hover {
        border-bottom-color: cyan;
      }

      /* NAV */
      nav {
        position: fixed;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent);
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 28px;
        z-index: 1000;
        color: white;
        transition: opacity 0.8s;
      }

      .logo {
        font-weight: bold;
        letter-spacing: 2px;
        font-size: 14px;
      }

      .nav-links {
        display: flex;
        gap: 18px;
      }

      .nav-links a {
        color: white;
        text-decoration: none;
        font-size: 14px;
        opacity: 0.75;
        transition: 0.3s;
      }

      .nav-links a:hover {
        opacity: 1;
        text-shadow: 0 0 10px white, 0 0 20px white;
      }

      /* LASER ACCENT LINE */
      .laser-line {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg,
            transparent 0%,
            cyan 20%,
            magenta 50%,
            cyan 80%,
            transparent 100%);
        background-size: 200% 100%;
        animation: laserSweep 4s linear infinite;
        opacity: 0.6;
        z-index: 99;
      }

      @keyframes laserSweep {
        0% {
          background-position: 200% 0;
        }

        100% {
          background-position: -200% 0;
        }
      }

      /* CONTENT */
      .content {
        max-width: 720px;
        margin: 0 auto;
        padding: 140px 40px 80px;
        position: relative;
        z-index: 1;
      }

      .page-label {
        font-size: 11px;
        letter-spacing: 4px;
        opacity: 0.4;
        text-transform: uppercase;
        margin-bottom: 48px;
      }

      h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 700;
        line-height: 1.1;
        margin-bottom: 48px;
        letter-spacing: -1px;
      }

      .divider {
        width: 40px;
        height: 1px;
        background: cyan;
        margin-bottom: 40px;
        opacity: 0.5;
      }

      /* INFO LIST */
      .info-list {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .info-item {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 24px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .info-item:first-child {
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .info-type {
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        opacity: 0.35;
      }

      .info-text {
        font-size: 15px;
        line-height: 1.8;
        opacity: 0.75;
      }

      /* MOBILE */
      .hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
        z-index: 1001;
      }

      .hamburger span {
        display: block;
        width: 22px;
        height: 2px;
        background: white;
        transition: 0.3s;
      }

      @media (max-width: 600px) {
        .content {
          padding: 120px 24px 60px;
        }

        .hamburger {
          display: flex;
        }

        .nav-links {
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100vh;
          background: black;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          gap: 32px;
          z-index: 1000;
        }

        .nav-links.open {
          display: flex;
        }

        .nav-links a {
          font-size: 20px;
        }
      }
    </style>
  </head>

  <body>

    <nav id="nav">
      <div class="logo">DK's Portfolio</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="bio.html">Artist Bio</a>
        <a href="work.html">Work</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>


    <div class="content">
      <div class="info-list">
        <p class="page-label">Contact</p>

        <h1>Get in Touch</h1>

        <div class="divider"></div>
        <div class="info-item">
          <span class="info-type">LinkedIn</span>
          <span class="info-text">Connect with me <a class="inline-link" href="https://www.linkedin.com/in/dokyong-ryoo/" target="blank">here</a>!</span>
        </div>

        <div class="info-item">
          <span class="info-type">IG</span>
          <span class="info-text"><a class="inline-link" href="https://instagram.com/dokyongryoo" target="blank">@dokyongryoo</a></span>
        </div>

      </div>
    </div>

  </body>
</html>
