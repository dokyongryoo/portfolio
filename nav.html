<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pages | Dokyong Ryo</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    /* UI layer above WebGL */
    .ui {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      color: white;
      text-align: center;
    }

    h1 {
      margin-bottom: 40px;
      letter-spacing: 2px;
      font-size: 28px;
      opacity: 0.9;
    }

    a {
      display: block;
      margin: 14px;
      font-size: 22px;
      color: white;
      text-decoration: none;
      opacity: 0.7;
      transition: 0.2s;
      cursor: pointer;
    }

    a:hover {
      opacity: 1;
      text-shadow: 0 0 12px currentColor, 0 0 24px currentColor;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.152/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152/examples/jsm/"
      }
    }
  </script>
</head>

<body>

  <div class="ui">
    <h1>Dokyong Ryoo</h1>

    <a data-color="0x000000" data-link="home.html">Home</a>
    <a data-color="0xff0033" data-link="bio.html">Artist Bio</a>
    <a data-color="0x00ff66" data-link="work.html">Work</a>
    <a data-color="0xffcc00" data-link="contact.html">Contact</a>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

    // ---------------- SCENE ----------------
    const scene = new THREE.Scene();

    const camera = new THREE.OrthographicCamera(
      window.innerWidth / -2,
      window.innerWidth / 2,
      window.innerHeight / 2,
      window.innerHeight / -2,
      1,
      1000
    );
    camera.position.z = 10;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // ---------------- BLOOM ----------------
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.2,
      0.4,
      0.2
    );
    composer.addPass(bloomPass);

    // ---------------- FULLSCREEN LASER ----------------
    const geometry = new THREE.PlaneGeometry(2000, 10);
    const material = new THREE.MeshBasicMaterial({
      color: 0x00ffff,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthTest: false
    });

    const beam = new THREE.Mesh(geometry, material);
    beam.scale.y = 0;
    scene.add(beam);

    // ---------------- STATE ----------------
    let animating = false;
    let targetUrl = null;
    let t = 0;

    function animate () {
      requestAnimationFrame(animate);

      if (animating) {
        t += 0.02;

        // expand beam vertically
        beam.scale.y = Math.min(t * 30, 60);

        // bloom intensifies
        bloomPass.strength = Math.min(t * 2, 2.5);

        if (t > 1.2) {
          window.location.href = targetUrl;
        }
      }

      composer.render();
    }

    animate();

    // ---------------- CLICK BEHAVIOR ----------------
    document.querySelectorAll("a").forEach(link => {
      link.addEventListener("click", (e) => {
        e.preventDefault();

        const color = parseInt(link.dataset.color);
        targetUrl = link.dataset.link;

        // set beam color
        material.color.setHex(color);

        // reset animation
        t = 0;
        animating = true;
      });
    });

    // ---------------- RESIZE ----------------
    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.left = window.innerWidth / -2;
      camera.right = window.innerWidth / 2;
      camera.top = window.innerHeight / 2;
      camera.bottom = window.innerHeight / -2;
      camera.updateProjectionMatrix();
      composer.setSize(window.innerWidth, window.innerHeight);
    });

  </script>

</body>
</html>
