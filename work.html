<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work | Dokyong Ryoo</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: black;
        color: white;
        font-family: Arial, sans-serif;
      }

      /* NAV */
      nav {
        position: fixed;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent);
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 28px;
        z-index: 1000;
        color: white;
        transition: opacity 0.8s;
      }

      .logo {
        font-weight: bold;
        letter-spacing: 2px;
        font-size: 14px;
      }

      .nav-links {
        display: flex;
        gap: 18px;
      }

      .nav-links a {
        color: white;
        text-decoration: none;
        font-size: 14px;
        opacity: 0.75;
        transition: 0.3s;
      }

      .nav-links a:hover {
        opacity: 1;
        text-shadow: 0 0 10px white, 0 0 20px white;
      }

      /* PAGE TITLE */
      .header {
        padding: 100px 40px 40px;
      }

      .header h1 {
        font-size: 2.5rem;
      }

      /* GRID GALLERY */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        padding: 40px;
      }

      /* PROJECT CARD */
      .card {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
        cursor: pointer;
        background: #111;
        aspect-ratio: 4 / 3;
        transition: transform 0.3s ease;
        text-decoration: none;
        color: white;
      }

      .card:hover {
        transform: scale(1.03);
      }

      .card:visited {
        color: #ff00f2;
      }

      .card:active {
        color: cyan;
      }

      /* IMAGE */
      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
      }

      .card:hover img {
        transform: scale(1.1);
      }

      /* OVERLAY */
      .overlay {
        position: absolute;
        bottom: 0;
        width: 100%;
        padding: 20px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
      }

      .overlay h3 {
        font-size: 1.2rem;
      }

      .overlay p {
        font-size: 0.9rem;
        opacity: 0.7;
      }

      /* MOBILE */
      @media (max-width: 600px) {
        .header {
          padding: 20px;
        }
      }
    </style>
  </head>

  <body>

    <nav id="nav">
      <div class="logo">DK's Portfolio</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="bio.html">Artist Bio</a>
        <a href="work.html">Work</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <div class="header">
      <h1>Selected Work</h1>
    </div>

    <div class="grid">

      <a class="card" href="lofi_nofi_cinema/lofi_nofi_cinema.html">
        <img src="lofi_nofi_cinema/lofi_nofi_cinema.gif" alt="LoFi / NoFi Cinema">
        <div class="overlay">
          <h3>LoFi / NoFi Cinema</h3>
          <p>Video - KODAK Charmera, iMovie</p>
        </div>
      </a>

      <a class="card" href="from_the_metro/from_the_metro.html">
        <img src="from_the_metro/from_the_metro.gif" alt="From the Metro">
        <div class="overlay">
          <h3>From the Metro</h3>
          <p>Interactive 3D Video Installation</p>
        </div>
      </a>

      <a class="card" href="10print/10print.html">
        <img src="10print/10print.gif">
        <div class="overlay">
          <h3>Ocean 10Print</h3>
          <p>Generative Web Art - JavaScript, HTML</p>
        </div>
      </a>

    </div>

  </body>
</html>
