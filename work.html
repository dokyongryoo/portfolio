<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work | Dokyong Ryoo</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: black;
        color: white;
        font-family: Arial, sans-serif;
      }

      /* NAV */
      nav {
        display: flex;
        justify-content: space-between;
        padding: 20px 40px;
        align-items: center;
      }

      nav a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        opacity: 0.8;
      }

      nav a:hover {
        opacity: 1;
      }

      /* PAGE TITLE */
      .header {
        padding: 40px;
      }

      .header h1 {
        font-size: 2.5rem;
      }

      /* GRID GALLERY */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        padding: 40px;
      }

      /* PROJECT CARD */
      .card {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
        cursor: pointer;
        background: #111;
        aspect-ratio: 4 / 3;
        transition: transform 0.3s ease;
      }

      .card:hover {
        transform: scale(1.03);
      }

      /* IMAGE */
      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
      }

      .card:hover img {
        transform: scale(1.1);
      }

      /* OVERLAY */
      .overlay {
        position: absolute;
        bottom: 0;
        width: 100%;
        padding: 20px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
      }

      .overlay h3 {
        font-size: 1.2rem;
      }

      .overlay p {
        font-size: 0.9rem;
        opacity: 0.7;
      }

      /* MOBILE */
      @media (max-width: 600px) {
        nav {
          flex-direction: column;
          gap: 10px;
        }

        .header {
          padding: 20px;
        }
      }
    </style>
  </head>

  <body>

    <nav>
      <div><strong>Dokyong Ryoo</strong></div>
      <div>
        <a href="home.html">Home</a>
        <a href="bio.html">Bio</a>
        <a href="work.html">Work</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <div class="header">
      <h1>Selected Work</h1>
    </div>

    <div class="grid">

      <a class="card" href="project1.html">
        <img src="">
        <div class="overlay">
          <h3>Tiny Camera</h3>
          <p>Video</p>
        </div>
      </a>

      <a class="card" href="project2.html">
        <img src="">
        <div class="overlay">
          <h3>From the Metro</h3>
          <p>Video</p>
        </div>
      </a>

      <a class="card" href="project3.html">
        <img src="">
        <div class="overlay">
          <h3>Ocean 10Print</h3>
          <p>Website</p>
        </div>
      </a>

    </div>

  </body>
</html>
