<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Dokyong Ryoo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
        display: block;
      }

      nav {
        position: fixed;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent);
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 28px;
        z-index: 1000;
        color: white;
        transition: opacity 0.8s;
      }

      .logo {
        font-weight: bold;
        letter-spacing: 2px;
        font-size: 14px;
      }

      .nav-links {
        display: flex;
        gap: 18px;
      }

      .nav-links a {
        color: white;
        text-decoration: none;
        font-size: 14px;
        opacity: 0.75;
        transition: 0.3s;
      }

      .nav-links a:hover {
        opacity: 1;
        text-shadow: 0 0 10px white, 0 0 20px white;
      }

      /* HAMBURGER */
      .hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
        z-index: 1001;
      }

      .hamburger span {
        display: block;
        width: 22px;
        height: 2px;
        background: white;
        transition: 0.3s;
      }

      @media (max-width: 600px) {
        nav {
          padding: 14px 16px;
        }

        .hamburger {
          display: flex;
        }

        .nav-links {
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100vh;
          background: black;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          gap: 32px;
          z-index: 1000;
        }

        .nav-links.open {
          display: flex;
        }

        .nav-links a {
          font-size: 20px;
        }
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.152/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152/examples/jsm/"
        }
      }
    </script>
  </head>

  <body style="overscroll-behavior-x: auto;">
    <nav id="nav">
      <div class="logo">DK's Portfolio</div>
      <div class="hamburger" id="hamburger" onclick="this.classList.toggle('active'); document.getElementById('navLinks').classList.toggle('open')">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="bio.html">Artist Bio</a>
        <a href="work.html">Work</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <script type="module">
      import * as THREE from "three";
      import {
        EffectComposer
      } from "three/addons/postprocessing/EffectComposer.js";
      import {
        RenderPass
      } from "three/addons/postprocessing/RenderPass.js";
      import {
        UnrealBloomPass
      } from "three/addons/postprocessing/UnrealBloomPass.js";

      let width = window.innerWidth;
      let height = window.innerHeight;

      const scene = new THREE.Scene();

      const camera = new THREE.OrthographicCamera(
        width / -2, width / 2,
        height / 2, height / -2,
        1, 1000
      );
      camera.position.z = 10;

      const renderer = new THREE.WebGLRenderer({
        antialias: true
      });
      renderer.autoClear = false;
      renderer.setSize(width, height);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));

      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(width, height),
        1.2,
        0.4,
        0.2
      );
      composer.addPass(bloomPass);

      // ---------- TRIANGLE LASER ----------
      function createLaser (y, angle) {
        const material = new THREE.ShaderMaterial({
          uniforms: {
            uTime: {
              value: 0
            },
            uAngle: {
              value: angle
            }
          },
          transparent: true,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          vertexShader: `
            varying vec2 vUv;
            void main() {
              vUv = uv;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
            }
          `,
          fragmentShader: `
            varying vec2 vUv;
            uniform float uTime;
            uniform float uAngle;

            vec3 hsv2rgb(vec3 c) {
              vec3 rgb = clamp(abs(mod(c.x*6.0 + vec3(0,4,2),6.0)-3.0)-1.0, 0.0, 1.0);
              return c.z * mix(vec3(1.0), rgb, c.y);
            }

            void main() {
              vec2 uv = vUv * 2.0 - 1.0;

              float s = sin(uAngle);
              float c = cos(uAngle);
              uv = mat2(c, -s, s, c) * uv;

              float steps = 25.0;
              float intensity = 0.0;

              for (float i = 0.0; i < 25.0; i++) {
                if (i >= steps) break;
                float t = i / steps;

                float width = 0.1 + t * 0.6;
                float edge = abs(uv.x) - (width - abs(uv.y) * 1.2);
                float slice = smoothstep(0.02, 0.0, edge);
                slice *= (1.0 - t);
                intensity += slice * 0.04;
              }

              float hue = mod(uTime * 0.08 + uv.x * 0.4, 1.0);
              vec3 color = hsv2rgb(vec3(hue, 1.0, 1.0));

              float alpha = intensity * 0.5;
              gl_FragColor = vec4(color * alpha, alpha);
            }
          `
        });

        const geometry = new THREE.PlaneGeometry(width * 2, height * 2);
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.y = y;
        mesh.position.z = 0;
        scene.add(mesh);
        return mesh;
      }

      const centerBeam = createLaser(0, 0.0);
      const topBeam = createLaser(80, 0.5);
      const bottomBeam = createLaser(-80, -0.5);

      // ---------- TEXT ----------
      const textCanvas = document.createElement("canvas");
      const ctx = textCanvas.getContext("2d");
      const texture = new THREE.CanvasTexture(textCanvas);
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.generateMipmaps = false;

      function drawText () {
        const dpr = window.devicePixelRatio || 1;
        const fontSize = Math.round(120 * dpr);

        textCanvas.width = 4096;
        textCanvas.height = fontSize * 2;
        ctx.font = `bold ${fontSize}px Arial`;

        const measured = ctx.measureText("Dokyong Ryoo");
        const textW = Math.ceil(measured.width);

        const pad = Math.round(fontSize * 0.2);
        textCanvas.width = textW + pad * 2;
        textCanvas.height = fontSize + pad * 2;

        ctx.font = `bold ${fontSize}px Arial`;
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Dokyong Ryoo", textCanvas.width / 2, textCanvas.height / 2);

        texture.needsUpdate = true;
      }

      drawText();

      const textMaterial = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        depthTest: false,
      });

      function makeTextGeometry () {
        const aspect = textCanvas.width / textCanvas.height;
        const w = width * 0.3;
        return new THREE.PlaneGeometry(w, w / aspect);
      }

      const textMesh = new THREE.Mesh(makeTextGeometry(), textMaterial);
      textMesh.position.z = 1;
      scene.add(textMesh);

      // ---------- ANIMATION ----------
      const MAX_TIME = 10;
      let time = 0;
      let redirected = false;

      function animate () {
        requestAnimationFrame(animate);

        if (time < MAX_TIME) time += 0.01;

        const t = time;

        centerBeam.material.uniforms.uTime.value = t;
        topBeam.material.uniforms.uTime.value = t;
        bottomBeam.material.uniforms.uTime.value = t;

        if (t < 1) {
          bloomPass.strength = t * 1.2;
          centerBeam.scale.x = t;
        } else if (t < 2) {
          centerBeam.scale.y = 1 + (t - 1) * 20;
        }

        if (t > 0.6 && t < 1.6) {
          topBeam.scale.x = (t - 0.6);
        } else if (t > 1.6) {
          topBeam.scale.y = 1 + (t - 1.6) * 15;
        }

        if (t > 0.9 && t < 1.9) {
          bottomBeam.scale.x = (t - 0.9);
        } else if (t > 1.9) {
          bottomBeam.scale.y = 1 + (t - 1.9) * 15;
        }

        renderer.clear();
        composer.render();
      }

      function goToNav (e) {
        if (redirected) return;
        if (e.target.closest("#nav")) return;

        redirected = true;

        renderer.domElement.style.opacity = "0";
        document.getElementById("nav").style.opacity = "0";

        setTimeout(() => {
          window.location.href = "nav.html";
        }, 800);
      }

      window.addEventListener("click", goToNav);
      window.addEventListener("keydown", goToNav);
      window.addEventListener("touchstart", goToNav);

      animate();

      window.addEventListener("resize", () => {
        width = window.innerWidth;
        height = window.innerHeight;

        renderer.setSize(width, height);

        camera.left = width / -2;
        camera.right = width / 2;
        camera.top = height / 2;
        camera.bottom = height / -2;
        camera.updateProjectionMatrix();

        composer.setSize(width, height);

        drawText();

        textMesh.geometry.dispose();
        textMesh.geometry = makeTextGeometry();
      });
    </script>
  </body>
</html>
