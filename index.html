<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dokyong Ryoo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
        display: block;
      }

      nav {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 28px;
        z-index: 10;
        color: white;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(8px);
        transition: opacity 0.8s;
      }

      .logo {
        font-weight: bold;
        letter-spacing: 2px;
      }

      .nav-links {
        display: flex;
        gap: 18px;
      }

      .nav-links a {
        color: white;
        text-decoration: none;
        font-size: 14px;
        opacity: 0.75;
        transition: 0.3s;
      }

      .nav-links a:hover {
        opacity: 1;
        text-shadow: 0 0 10px white, 0 0 20px white;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.152/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152/examples/jsm/"
        }
      }
    </script>
  </head>

  <body>
    <nav id="nav">
      <div class="logo">DK's Portfolio</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="bio.html">Artist Bio</a>
        <a href="work.html">Work</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <script type="module">
      import * as THREE from "three";
      import {
        EffectComposer
      } from "three/addons/postprocessing/EffectComposer.js";
      import {
        RenderPass
      } from "three/addons/postprocessing/RenderPass.js";
      import {
        UnrealBloomPass
      } from "three/addons/postprocessing/UnrealBloomPass.js";

      let width = window.innerWidth;
      let height = window.innerHeight;

      const scene = new THREE.Scene();
      const textScene = new THREE.Scene();

      const camera = new THREE.OrthographicCamera(
        width / -2, width / 2,
        height / 2, height / -2,
        1, 1000
      );
      camera.position.z = 10;

      const renderer = new THREE.WebGLRenderer({
        antialias: true
      });
      renderer.autoClear = false;
      renderer.setSize(width, height);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));

      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(width, height),
        1.5,
        0.4,
        0.2
      );
      composer.addPass(bloomPass);

      // ---------- TRIANGLE LASER ----------
      function createLaser (y, angle) {
        const material = new THREE.ShaderMaterial({
          uniforms: {
            uTime: {
              value: 0
            },
            uAngle: {
              value: angle
            }
          },
          transparent: true,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }
    `,
          fragmentShader: `
      varying vec2 vUv;
      uniform float uTime;
      uniform float uAngle;

      vec3 hsv2rgb(vec3 c) {
        vec3 rgb = clamp(abs(mod(c.x*6.0 + vec3(0,4,2),6.0)-3.0)-1.0, 0.0, 1.0);
        return c.z * mix(vec3(1.0), rgb, c.y);
      }

      void main() {
        // normalize to screen space
        vec2 uv = vUv * 2.0 - 1.0;

        // rotate beam
        float s = sin(uAngle);
        float c = cos(uAngle);
        uv = mat2(c, -s, s, c) * uv;

        // raymarch depth simulation
        float intensity = 0.0;
        float steps = 25.0;

        for (float i = 0.0; i < steps; i++) {
          float t = i / steps;

          // widen beam with depth
          float width = 0.1 + t * 0.6;

          float edge = abs(uv.x) - (width - abs(uv.y) * 1.2);

          float slice = smoothstep(0.02, 0.0, edge);

          // fade with depth (fog effect)
          slice *= (1.0 - t);

          intensity += slice * 0.04;
        }

        // spatial color spectrum (merges naturally)
        float hue = mod(uTime * 0.08 + uv.x * 0.4, 1.0);
        vec3 color = hsv2rgb(vec3(hue, 1.0, 1.0));

        float alpha = intensity * 0.5;
gl_FragColor = vec4(color * alpha, alpha);
}
    `
        });

        const geometry = new THREE.PlaneGeometry(width * 2, height * 2);
        const mesh = new THREE.Mesh(geometry, material);

        mesh.position.y = y;
        scene.add(mesh);

        return mesh;
      }

      const centerBeam = createLaser(0, 0.0);
      const topBeam = createLaser(80, 0.5);
      const bottomBeam = createLaser(-80, -0.5);

      // ---------- TEXT ----------
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const texture = new THREE.CanvasTexture(canvas);

      function drawText () {
        canvas.width = width * 2;
        canvas.height = height * 0.5;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        ctx.font = `bold ${canvas.width * 0.08}px Arial`;
        ctx.fillText("Dokyong Ryoo", canvas.width / 2, canvas.height / 2);

        texture.needsUpdate = true;
      }

      drawText();

      const textMaterial = new THREE.ShaderMaterial({
        uniforms: {
          map: {
            value: texture
          },
          revealY: {
            value: 0
          }
        },
        transparent: true,
        depthTest: false,
        vertexShader: `
          varying vec2 vUv;
          void main(){
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
          }
        `,
        fragmentShader: `
          uniform sampler2D map;
          uniform float revealY;
          varying vec2 vUv;

          void main(){
            vec4 tex = texture2D(map, vUv);
            float mask = 1.0;
            gl_FragColor = vec4(tex.rgb, tex.a * mask);
          }
        `
      });

      const textMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(800, 200),
        textMaterial
      );
      textScene.add(textMesh);

      // ---------- ANIMATION ----------
      let time = 0;
      let redirected = false;

      function animate () {
        requestAnimationFrame(animate);

        time += 0.01;

        centerBeam.material.uniforms.uTime.value = time;
        topBeam.material.uniforms.uTime.value = time;
        bottomBeam.material.uniforms.uTime.value = time;

        // intro motion
        if (time < 1) {
          bloomPass.strength = time * 1.5;
          centerBeam.scale.x = time;
        } else if (time < 2) {
          centerBeam.scale.y = 1 + (time - 1) * 20;
        }

        if (time > 0.6 && time < 1.6) {
          topBeam.scale.x = (time - 0.6);
        } else if (time > 1.6) {
          topBeam.scale.y = 1 + (time - 1.6) * 15;
        }

        if (time > 0.9 && time < 1.9) {
          bottomBeam.scale.x = (time - 0.9);
        } else if (time > 1.9) {
          bottomBeam.scale.y = 1 + (time - 1.9) * 15;
        }

        renderer.clear();
        composer.render();
        renderer.render(textScene, camera);
      }

      function goToNav (e) {
        if (redirected) return;
        if (e.target.tagName === "A") return;

        redirected = true;

        renderer.domElement.style.opacity = "0";
        document.getElementById("nav").style.opacity = "0";

        setTimeout(() => {
          window.location.href = "nav.html";
        }, 800);
      }

      window.addEventListener("click", goToNav);
      window.addEventListener("keydown", goToNav);
      window.addEventListener("touchstart", goToNav);

      animate();

      window.addEventListener("resize", () => {
        width = window.innerWidth;
        height = window.innerHeight;

        renderer.setSize(width, height);

        camera.left = width / -2;
        camera.right = width / 2;
        camera.top = height / 2;
        camera.bottom = height / -2;
        camera.updateProjectionMatrix();

        composer.setSize(width, height);

        drawText();
      });
    </script>
  </body>
</html>
